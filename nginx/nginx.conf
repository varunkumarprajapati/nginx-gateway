events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance optimization: Enable connection reuse to avoid TCP handshake overhead
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Upstream pointing to your decoupled Auth Service container
    upstream auth_server {
        server auth_service:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name demonvoid.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name demonvoid.duckdns.org;

        # Let's Encrypt SSL Certificates (Mounted from the host machine via Docker volumes)
        ssl_certificate     /etc/letsencrypt/live/demonvoid.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/demonvoid.duckdns.org/privkey.pem;

        # Modern SSL protocol security optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Standard modern proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
   

        # ----------------------------------------------------------------------
        # PUBLIC AUTH ROUTES (No authentication required to hit these)
        # ----------------------------------------------------------------------
        location / {
            proxy_pass http://auth_server;

        }

        location /api/auth/ {
            proxy_pass http://auth_server;
        }

        location /api/users/ {
            proxy_pass http://auth_server;
        }

        # ----------------------------------------------------------------------
        # INTERNAL VALIDATION ENDPOINT (Hidden from public access)
        # ----------------------------------------------------------------------
        # NGINX intercepts protected traffic and calls this internally first
        location = /api/auth/validate {
            internal;
            proxy_pass http://auth_server/api/auth/validate;
            
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ----------------------------------------------------------------------
        # PROTECTED EXTERNAL APP ROUTES (Triggers Auth Check before forwarding)
        # ----------------------------------------------------------------------
        # location /api/app-one/ {
        #     # Step A: Validate token against auth service first
        #     auth_request /api/auth/validate;

        #     # Step B: If 200 OK, forward to your external server domain/IP
        #     proxy_pass https://app-one-backend.different-domain.com/;
        # }
     }
}